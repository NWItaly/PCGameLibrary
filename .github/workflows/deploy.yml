name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into environment.prod.ts
        run: |
          sed -i "s|PLACEHOLDER_CLIENT_ID|${{ secrets.GOOGLE_CLIENT_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|PLACEHOLDER_SPREADSHEET_ID|${{ secrets.SPREADSHEET_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|PLACEHOLDER_STEAM_SCRIPT_ID|${{ secrets.STEAM_SCRIPT_ID }}|g" src/environments/environment.prod.ts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --base-href /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/pc-game-library/browser