services:
  pc-game-library:
    build: .
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - pc-game-library-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run start:local -- --host 0.0.0.0 --poll 500

volumes:
  pc-game-library-node-modules: