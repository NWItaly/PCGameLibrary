<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Steam API – Test CORS</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #1b2838; color: #c6d4df; }
    h1 { color: #66c0f4; }
    label { display: block; margin-bottom: .25rem; color: #8f98a0; }
    input { padding: .5rem; width: 300px; background: #2a475e; border: 1px solid #4b8bb3; color: #fff; border-radius: 4px; }
    button { margin-top: 1rem; padding: .5rem 1.5rem; background: #1a9fff; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #66c0f4; }
    #result { margin-top: 1.5rem; white-space: pre-wrap; background: #171d25; padding: 1rem; border-radius: 6px; border: 1px solid #2a475e; min-height: 80px; }
    .ok  { color: #57cbde; }
    .err { color: #ff6b6b; }
    .warn { color: #f8b700; }
  </style>
</head>
<body>
  <h1>🎮 Steam API – Test CORS</h1>
  <p>Inserisci uno <strong>Steam App ID</strong> (es. <code>1091500</code> = Cyberpunk 2077) e premi il pulsante.<br>
  Apri la console del browser (F12) per i dettagli completi.</p>

  <label for="appId">App ID</label>
  <input id="appId" type="number" value="1091500" />
  <br>
  <button onclick="testSteam()">Prova chiamata Steam</button>

  <div id="result">In attesa...</div>

  <script>
    async function testSteam() {
      const appId = document.getElementById('appId').value.trim();
      const out = document.getElementById('result');
      out.textContent = '⏳ Chiamata in corso...';
      out.className = '';

      // Steam non supporta CORS direttamente; proviamo sia con che senza il
      // parametro &l=italian per vedere cosa risponde (o se risponde).
      const url = `https://store.steampowered.com/api/appdetails?appids=${appId}`;
      console.log('[SteamTest] URL:', url);

      try {
        const res = await fetch(url);

        console.log('[SteamTest] Status:', res.status);
        console.log('[SteamTest] Headers:', [...res.headers.entries()]);

        if (!res.ok) {
          out.textContent = `❌ HTTP ${res.status} ${res.statusText}`;
          out.className = 'err';
          return;
        }

        const json = await res.json();
        const gameData = json[appId];

        if (!gameData?.success) {
          out.textContent = `⚠️ Steam ha risposto ma "success: false" per App ID ${appId}.\nRisposta grezza:\n${JSON.stringify(json, null, 2)}`;
          out.className = 'warn';
          return;
        }

        const d = gameData.data;
        const summary = {
          nome:         d.name,
          appId:        d.steam_appid,
          dataRilascio: d.release_date?.date,
          immagine:     d.header_image,
          italiano:     d.supported_languages?.includes('Italian'),
          generi:       d.genres?.map(g => g.description) ?? [],
          categorie:    d.categories?.map(c => c.description) ?? [],
        };

        out.textContent = `✅ Risposta OK!\n\n${JSON.stringify(summary, null, 2)}`;
        out.className = 'ok';
        console.log('[SteamTest] Dati completi:', d);

      } catch (err) {
        // CORS → TypeError: Failed to fetch
        out.textContent = `❌ ERRORE: ${err.message}\n\nSe vedi "Failed to fetch" o "CORS" nella console,\nSteam blocca le chiamate cross-origin dal browser.\nServirà un proxy.`;
        out.className = 'err';
        console.error('[SteamTest] Errore:', err);
      }
    }
  </script>
</body>
</html>
